<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ADL Sim">
<meta name="theme-color" content="#0f1117">
<title>ADL Finance — Simulateur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #181c27;
    --surf2:   #1f2435;
    --border:  #2a3048;
    --accent:  #4f8ef7;
    --accent2: #f7a94f;
    --accent3: #4fccf7;
    --success: #4fc98a;
    --text:    #e8eaf2;
    --muted:   #7a82a0;
    --radius:  16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem; display: flex; align-items: center; gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }

  .badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 4px 10px; border-radius: 20px;
    background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.3);
    color: var(--accent);
  }

  /* ── BODY ── */
  .body { padding: 16px; }

  /* ── TOGGLE EMPRUNTEURS ── */
  .toggle-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 16px;
  }

  .toggle-btn {
    padding: 14px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.18s; text-align: center;
  }

  .toggle-btn.a1 { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.08); }
  .toggle-btn.a2 { border-color: var(--success); color: var(--success); background: rgba(79,201,138,0.08); }

  /* ── CARTE ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }

  .card-title {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-title::before {
    content: ''; width: 12px; height: 2px;
    background: var(--accent); border-radius: 2px; display: inline-block;
  }
  .card-title.orange::before { background: var(--accent2); }

  /* ── CHAMPS ── */
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block; font-size: 0.78rem; color: var(--muted);
    font-weight: 500; margin-bottom: 6px;
  }
  label span { color: var(--accent); }

  input, select {
    width: 100%; background: var(--surf2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 14px 14px; outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }
  input::placeholder { color: #3d4560; }
  select option { background: var(--surf2); }

  .hint { font-size: 0.7rem; color: #3d4560; margin-top: 4px; }

  /* ── TAUX ── */
  .taux-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }

  .taux-field { display: flex; flex-direction: column; gap: 6px; }

  .taux-lbl {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 4px 6px; border-radius: 6px; text-align: center;
  }
  .tl1 { background: rgba(79,142,247,0.12); color: var(--accent); }
  .tl2 { background: rgba(247,169,79,0.12);  color: var(--accent2); }
  .tl3 { background: rgba(79,204,247,0.12);  color: var(--accent3); }

  .taux-field input { text-align: center; font-size: 1.1rem; font-weight: 700; padding: 12px 6px; }

  .rav-info {
    font-size: 0.75rem; color: var(--muted); margin-top: 10px;
    padding: 8px 12px; background: var(--surf2); border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  /* ── BOUTONS ── */
  .btn-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; margin-bottom: 16px; }

  .btn-reset {
    background: var(--surf2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
  }

  .btn-calc {
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 16px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-calc:active { transform: scale(0.97); }

  /* ── ALERTE ── */
  .alert {
    background: rgba(247,169,79,0.08); border: 1px solid rgba(247,169,79,0.3);
    color: var(--accent2); border-radius: 10px; padding: 12px 14px;
    font-size: 0.82rem; display: none; margin-bottom: 12px;
  }
  .alert.show { display: block; }

  /* ── RÉSULTATS ── */
  .results { display: none; }
  .results.show { display: block; }

  .amounts-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }

  .amount-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 10px; text-align: center;
  }

  .amount-card .sc { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .amount-card .val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; line-height: 1; margin-bottom: 3px; }
  .amount-card .sub { font-size: 0.65rem; color: var(--muted); }

  .ac1 .val { color: var(--accent); }
  .ac2 .val { color: var(--accent2); }
  .ac3 .val { color: var(--accent3); }

  /* ── MESSAGE ── */
  .msg-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }

  .msg-hdr {
    background: var(--surf2); padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
  }

  .msg-body {
    padding: 14px 16px; font-size: 0.9rem; line-height: 1.75;
    color: #c8cce0; white-space: pre-wrap; word-break: break-word;
  }

  .btn-copy {
    width: 100%; padding: 16px; margin: 0;
    background: rgba(79,142,247,0.1); color: var(--accent);
    border: none; border-top: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-copy:active { background: rgba(79,142,247,0.2); }
  .btn-copy.copied { background: rgba(79,201,138,0.1); color: var(--success); border-top-color: rgba(79,201,138,0.2); }

  /* ── DETAIL CALCUL ── */
  .detail {
    background: var(--surf2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-size: 0.78rem; color: var(--muted); line-height: 2;
    margin-bottom: 12px;
  }
  .detail strong { color: var(--text); }
  .hl  { color: var(--success); font-weight: 700; }
  .hl2 { color: var(--accent2); font-weight: 700; }
  .hl3 { color: var(--accent);  font-weight: 700; }

  /* ── SEP ── */
  .sep {
    font-size: 0.65rem; color: var(--muted); display: flex;
    align-items: center; gap: 8px; margin: 4px 0 12px;
  }
  .sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-dot"></div>ADL Finance</div>
  <div class="badge">Simulateur</div>
</div>

<div class="body">

  <!-- TAUX -->
  <div class="card">
    <div class="card-title orange">Taux annuels</div>
    <div class="taux-row">
      <div class="taux-field">
        <div class="taux-lbl tl1">125%</div>
        <input type="number" id="taux1" value="5.8" step="0.1" min="0" inputmode="decimal">
      </div>
      <div class="taux-field">
        <div class="taux-lbl tl2">100%</div>
        <input type="number" id="taux2" value="4.8" step="0.1" min="0" inputmode="decimal">
      </div>
      <div class="taux-field">
        <div class="taux-lbl tl3">BQ</div>
        <input type="number" id="taux3" value="3.8" step="0.1" min="0" inputmode="decimal">
      </div>
    </div>
  </div>

  <!-- EMPRUNTEURS -->
  <div class="toggle-row">
    <button class="toggle-btn a1" id="btn1" onclick="setEmp(1)">👤 1 emprunteur</button>
    <button class="toggle-btn"   id="btn2" onclick="setEmp(2)">👥 2 emprunteurs</button>
  </div>

  <!-- DONNÉES -->
  <div class="card">
    <div class="card-title">Données client</div>

    <div class="field">
      <label>Revenus nets — Emprunteur 1 <span>*</span></label>
      <input type="number" id="rev1" placeholder="ex : 2 500" min="0" step="50" inputmode="numeric">
    </div>

    <div class="field" id="champ2" style="display:none">
      <label>Revenus nets — Emprunteur 2</label>
      <input type="number" id="rev2" placeholder="ex : 2 200" min="0" step="50" inputmode="numeric">
    </div>

    <div class="field">
      <label>Revenus non pondérés (invalidité, chômage…)</label>
      <input type="number" id="revA" placeholder="laisser vide si aucun" min="0" step="50" inputmode="numeric">
    </div>

    <div class="field">
      <label>Charges mensuelles <span>*</span></label>
      <input type="number" id="charges" placeholder="0 si aucune" min="0" step="50" inputmode="numeric">
    </div>

    <div class="field">
      <label>Durée du crédit</label>
      <select id="duree">
        <option value="15">15 ans</option>
        <option value="20">20 ans</option>
        <option value="25" selected>25 ans</option>
        <option value="30">30 ans</option>
      </select>
    </div>

    <div class="rav-info" id="ravInfo">Reste à vivre min : <strong>1 500 €</strong> (emprunt seul)</div>
  </div>

  <div class="alert" id="alerte">⚠️ Revenus Emprunteur 1 et charges obligatoires.</div>

  <div class="btn-row">
    <button class="btn-reset" onclick="reset()">↺</button>
    <button class="btn-calc"  onclick="calculer()">Calculer →</button>
  </div>

  <!-- RÉSULTATS -->
  <div class="results" id="results">

    <div class="sep">Détail du calcul</div>
    <div class="detail" id="detail"></div>

    <div class="sep">Résultats</div>
    <div class="amounts-row" id="amounts"></div>

    <div class="sep">Texte Messenger</div>
    <div class="msg-card">
      <div class="msg-hdr">✓ Prêt à copier-coller</div>
      <div class="msg-body" id="msgText"></div>
      <button class="btn-copy" id="btnCopy" onclick="copier()">📋 Copier le message</button>
    </div>

  </div>

</div>

<script>
var nbEmp = 1;
var cap1 = 0, cap2 = 0, cap3 = 0;

function setEmp(n) {
  nbEmp = n;
  document.getElementById('btn1').className = 'toggle-btn' + (n===1 ? ' a1' : '');
  document.getElementById('btn2').className = 'toggle-btn' + (n===2 ? ' a2' : '');
  document.getElementById('champ2').style.display = n===2 ? 'block' : 'none';
  if (n===1) document.getElementById('rev2').value = '';
  document.getElementById('ravInfo').innerHTML = n===1
    ? 'Reste à vivre min : <strong>1 500 €</strong> (emprunt seul)'
    : 'Reste à vivre min : <strong>2 000 €</strong> (couple)';
}

function calculer() {
  var rev1    = parseFloat(document.getElementById('rev1').value)    || 0;
  var rev2    = parseFloat(document.getElementById('rev2').value)    || 0;
  var revA    = parseFloat(document.getElementById('revA').value)    || 0;
  var charges = parseFloat(document.getElementById('charges').value);
  var duree   = parseInt(document.getElementById('duree').value);
  var t1      = parseFloat(document.getElementById('taux1').value) / 100;
  var t2      = parseFloat(document.getElementById('taux2').value) / 100;
  var t3      = parseFloat(document.getElementById('taux3').value) / 100;

  var alerte = document.getElementById('alerte');
  if (!rev1 || isNaN(charges)) { alerte.classList.add('show'); return; }
  alerte.classList.remove('show');

  var couple  = nbEmp === 2;
  var revPond = (rev1 + rev2) * 1.05 + revA;

  // S1 : 125% — RAV 1500/2000, 50%
  var rav1 = couple ? 2000 : 1500;
  var s1m  = Math.min(revPond - rav1, revPond * 0.50) - charges;

  // S2 : 100% — RAV 1100/1300, 50%
  var rav2 = couple ? 1300 : 1100;
  var s2m  = Math.min(revPond - rav2, revPond * 0.50) - charges;

  // S3 : BQ — RAV 1100/1300, 60%
  var rav3 = couple ? 1300 : 1100;
  var s3m  = Math.min(revPond - rav3, revPond * 0.60) - charges;

  function capital(mens, tAnn, ans) {
    if (mens <= 0) return 0;
    var tm = tAnn / 12, n = ans * 12;
    return Math.round(mens * (1 - Math.pow(1+tm, -n)) / tm / 1000) * 1000;
  }

  cap1 = capital(s1m, t1, duree);
  cap2 = capital(s2m, t2, duree);
  cap3 = capital(s3m, t3, duree);

  var f  = function(n) { return n.toLocaleString('fr-BE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' \u20ac'; };
  var a1 = rav1 <= revPond * 0.50 - (rav1-revPond) ? 'A' : 'B';

  // Détail
  document.getElementById('detail').innerHTML =
    '<strong>Revenus pond\u00e9r\u00e9s</strong> : <span class="hl">' + f(revPond) + '</span><br>' +
    '<strong>Mens. max</strong> — 125%: <span class="hl3">' + f(s1m) + '</span> | 100%: <span class="hl2">' + f(s2m) + '</span> | BQ: <span class="hl">' + f(s3m) + '</span>';

  // Montants
  var fmt = function(n) { return n > 0 ? n.toLocaleString('fr-BE') + ' \u20ac' : '\u2014'; };
  document.getElementById('amounts').innerHTML =
    '<div class="amount-card ac1"><div class="sc">125%</div><div class="val">' + fmt(cap1) + '</div><div class="sub">' + (parseFloat(document.getElementById('taux1').value)).toFixed(1) + '% — ' + duree + ' ans</div></div>' +
    '<div class="amount-card ac2"><div class="sc">100%</div><div class="val">' + fmt(cap2) + '</div><div class="sub">' + (parseFloat(document.getElementById('taux2').value)).toFixed(1) + '% — ' + duree + ' ans</div></div>' +
    '<div class="amount-card ac3"><div class="sc">BQ</div><div class="val">' + fmt(cap3) + '</div><div class="sub">' + (parseFloat(document.getElementById('taux3').value)).toFixed(1) + '% — ' + duree + ' ans</div></div>';

  // Message
  var fMsg = function(n) { return n > 0 ? n.toLocaleString('fr-BE') + ' euros' : '\u2014'; };
  document.getElementById('msgText').textContent =
    'Voici votre capacit\u00e9 d\'emprunt sur base des informations que vous nous avez communiqu\u00e9es.\n' +
    'Le r\u00e9sultat n\'est en aucun cas une acceptation ni une offre de cr\u00e9dit, mais une simple simulation.\n' +
    'Nous vous proposons d\'agir avec sagesse, car emprunter de l\'argent co\u00fbte aussi de l\'argent.\n\n' +
    'Vos revenus permettent une capacit\u00e9 \u00e0 3 niveaux :\n' +
    '1 : Un montant total de ' + fMsg(cap1) + ', frais de notaire compris si aucun apport ni garantie n\'est ajout\u00e9\n' +
    '2 : Un montant de ' + fMsg(cap2) + ' si les frais de notaire sont apport\u00e9s en fonds propres ou par un cr\u00e9dit souscrit par un membre de la famille\n' +
    '3 : Un montant total de ' + fMsg(cap3) + ', frais de notaire compris si vous pouvez b\u00e9n\u00e9ficier d\'une garantie immobili\u00e8re compl\u00e9mentaire et familiale durant quelque temps !\n\n' +
    'Pour une simulation personnalis\u00e9e plus proche de la r\u00e9alit\u00e9 de votre projet, nous vous proposons un contact t\u00e9l\u00e9phonique sans frais ni engagement !\n' +
    'Laissez-nous un num\u00e9ro d\'appel et l\'heure la plus favorable pour vous joindre.\n' +
    'Merci.';

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copier() {
  var texte = document.getElementById('msgText').textContent;
  var btn   = document.getElementById('btnCopy');
  navigator.clipboard.writeText(texte).then(function() {
    btn.textContent = '\u2705 Copi\u00e9 !';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.innerHTML = '\uD83D\uDCCB Copier le message';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function reset() {
  ['rev1','rev2','revA','charges'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('duree').value = '25';
  document.getElementById('results').classList.remove('show');
  document.getElementById('alerte').classList.remove('show');
  setEmp(1);
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
